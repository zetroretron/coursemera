<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourseMera - Your Learning Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-left">
            <h1 class="logo">CourseMera</h1>
        </div>
        <div class="header-center">
            <input type="text" id="searchInput" placeholder="Search courses..." autocomplete="off">
        </div>
        <div class="header-right">
            <button id="themeToggle" class="icon-btn" title="Toggle theme">🌙</button>
            <button id="rescanBtn" class="icon-btn" title="Rescan courses">🔄</button>
        </div>
    </header>

    <main>
        <section id="folderSection" class="folder-section">
            <div class="welcome-card">
                <h2>Welcome to CourseMera</h2>
                <p>Select your courses folder to get started</p>
                <button id="selectFolderBtn" class="primary-btn">
                    📁 Select Courses Folder
                </button>
                <p class="folder-path" id="folderPath"></p>
            </div>
        </section>

        <section id="stats" class="stats-banner" style="display: none;">
            <div class="stat">
                <span class="stat-number" id="totalCourses">0</span>
                <span class="stat-label">Courses</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="totalVideos">0</span>
                <span class="stat-label">Videos</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="completedVideos">0</span>
                <span class="stat-label">Completed</span>
            </div>
        </section>

        <section id="recentSection" class="recent-section" style="display: none;">
            <h2>Continue Learning</h2>
            <div class="recent-ribbon" id="recentRibbon"></div>
        </section>

        <section class="filters" id="filtersSection" style="display: none;">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="ai">AI & ML</button>
            <button class="filter-btn" data-filter="web">Web Dev</button>
            <button class="filter-btn" data-filter="devops">DevOps</button>
            <button class="filter-btn" data-filter="career">Career</button>
            <button class="filter-btn" data-filter="python">Python</button>
            <button class="filter-btn" data-filter="java">Java</button>
            <select id="sortSelect" class="sort-select">
                <option value="recent">Recently Accessed</option>
                <option value="progress">Most Completed</option>
                <option value="alpha">A-Z</option>
            </select>
        </section>

        <div id="courseGrid" class="course-grid"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
