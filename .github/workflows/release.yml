name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows
            os: windows-latest
            artifact_name: CourseMera-Setup-${{ github.event.release.tag_name }}.exe
            build_config: --win
            upload_name: CourseMera-Windows-Setup
          - platform: macOS
            os: macos-latest
            artifact_name: CourseMera-${{ github.event.release.tag_name }}.dmg
            build_config: --mac
            upload_name: CourseMera-macOS-DMG
          - platform: Linux
            os: ubuntu-latest
            artifact_name: CourseMera-${{ github.event.release.tag_name }}.AppImage
            build_config: --linux
            upload_name: CourseMera-Linux-AppImage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install build dependencies
        run: |
          # Windows build tools
          if [ "${{ runner.os }}" == "Windows" ]; then
            choco install python2 --yes
          fi
          
          # macOS build tools
          if [ "${{ runner.os }}" == "macOS" ]; then
            brew update
            brew install gpgme
          fi
          
          # Linux build tools
          if [ "${{ runner.os }}" == "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y git libnss3-dev
          fi

      - name: Build application
        run: npm run build:${{ matrix.platform | lower }}

      - name: Verify build artifacts
        run: |
          ls -la dist/
          sha256sum dist/*

      - name: Create GitHub Release (if not exists)
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          release_name: Release ${{ github.event.release.tag_name }}
          draft: false
          prerelease: ${{ github.event.release.prerelease }}

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.artifact_name }}
          asset_content_type: application/octet-stream

  # Optional: Notify on completion
  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Status Summary
        run: |
          echo "Build matrix completed:"
          for os in windows macos linux; do
            echo "- $os: ${{ needs.build.result }}"
          done